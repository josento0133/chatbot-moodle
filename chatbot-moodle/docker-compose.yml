services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    ports:
      - "3306:3306"
    volumes:
      - moodle_db:/var/lib/mysql

  moodle:
    image: erseco/alpine-moodle:v4.5.11
    environment:
      DB_TYPE: mysqli
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: moodle
      DB_USER: moodle
      DB_PASS: moodlepass
      SITE_URL: http://localhost:8080
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: Admin1234!
      MOODLE_EMAIL: admin@example.com
    ports:
      - "8080:8080"
    volumes:
      - moodle_data:/var/www/moodledata
      - moodle_html:/var/www/html
      - ./moodle-plugin/block_chatbot:/var/www/html/blocks/chatbot
    depends_on:
      - db

volumes:
  moodle_db:
  moodle_data:
  moodle_html:
